services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marga_manager}
      POSTGRES_USER: ${POSTGRES_USER:-marga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marga123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marga} -d ${POSTGRES_DB:-marga_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    expose:
      - "8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: "0"
      DJANGO_SETTINGS_MODULE: config.settings.prod
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-marga.fullfocus.dev}
      POSTGRES_DB: ${POSTGRES_DB:-marga_manager}
      POSTGRES_USER: ${POSTGRES_USER:-marga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marga123}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://marga.fullfocus.dev}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
    volumes:
      - static_files:/app/static:ro

volumes:
  postgres_data:
  static_files:
