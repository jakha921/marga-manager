services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marga_manager}
      POSTGRES_USER: ${POSTGRES_USER:-marga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marga123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marga} -d ${POSTGRES_DB:-marga_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: jakha921/marga-backend:latest
    expose:
      - "8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: "0"
      DJANGO_SETTINGS_MODULE: config.settings.prod
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-marga.fullfocus.dev},localhost,127.0.0.1
      POSTGRES_DB: ${POSTGRES_DB:-marga_manager}
      POSTGRES_USER: ${POSTGRES_USER:-marga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marga123}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://marga.fullfocus.dev}
      PAYME_MERCHANT_ID: ${PAYME_MERCHANT_ID}
      PAYME_MERCHANT_KEY: ${PAYME_MERCHANT_KEY}
      PAYME_CHECKOUT_URL: ${PAYME_CHECKOUT_URL:-https://checkout.paycom.uz}
      PAYME_CALLBACK_URL: ${PAYME_CALLBACK_URL:-https://marga.fullfocus.dev/#/settings}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(5); s.connect(('127.0.0.1',8000)); s.close()\" 2>/dev/null"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

  frontend:
    image: jakha921/marga-frontend:latest
    expose:
      - "80"
    depends_on:
      - backend
    volumes:
      - static_files:/app/static:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  static_files:
