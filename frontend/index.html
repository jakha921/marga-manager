<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MARGA MANAGER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&family=Inter:wght@400;500;600&family=Unbounded:wght@500;600;700&family=Golos+Text:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              slate: {
                50: '#f8fafc',
                100: '#f1f5f9',
                200: '#e2e8f0',
                300: '#cbd5e1',
                400: '#94a3b8',
                500: '#64748b',
                600: '#475569',
                700: '#334155',
                800: '#1e293b',
                900: '#0f172a',
                950: '#020617',
              },
              primary: {
                DEFAULT: '#18181b', // Slate 900 for buttons
                foreground: '#ffffff',
              },
              accent: {
                50: '#f0fdf4',
                100: '#dcfce7',
                200: '#bbf7d0', // Soft green for highlights
                300: '#86efac',
                400: '#4ade80',
                500: '#22c55e',
              }
            },
            fontFamily: {
              display: ['DM Sans', 'sans-serif'],
              body: ['Inter', 'sans-serif'],
            },
            boxShadow: {
              'soft': '0 2px 10px rgba(0,0,0,0.03)',
              'card': '0 0 0 1px rgba(0,0,0,0.03), 0 2px 8px rgba(0,0,0,0.04)',
            },
            borderRadius: {
              'xl': '0.75rem',
              '2xl': '1rem',
              '3xl': '1.5rem',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --bg-primary: #f1f5f9;
        --bg-surface: #ffffff;
        --bg-surface-2: #f8fafc;
        --text-primary: #0f172a;
        --text-secondary: #64748b;
        --text-muted: #94a3b8;
        --border-color: #e2e8f0;
        --border-light: #f1f5f9;
        --color-primary: #0f172a;
        --color-accent: #10b981;
        --shadow-card: 0 1px 3px 0 rgb(0 0 0 / 0.06), 0 1px 2px -1px rgb(0 0 0 / 0.06);
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Inter', sans-serif;
        transition: background-color 0.2s ease, color 0.2s ease;
      }
      .shadow-card {
        box-shadow: var(--shadow-card);
      }
      /* Landing "ledger" theme (страница-журнал учёта) */
      .mg-display { font-family: 'Unbounded', 'DM Sans', sans-serif; letter-spacing: -0.01em; }
      .mg-body { font-family: 'Golos Text', 'Inter', sans-serif; }
      .mg-mono { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }
      .mg-ledger-rules {
        background-image: repeating-linear-gradient(to bottom, transparent 0 27px, #dce4f0 27px 28px);
      }
      .mg-ledger-margin { position: relative; }
      .mg-ledger-margin::before {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        left: 2rem;
        width: 1.5px;
        background: rgba(196, 59, 46, 0.4);
      }
      .sidebar-scroll::-webkit-scrollbar {
        width: 4px;
      }
      .sidebar-scroll::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
