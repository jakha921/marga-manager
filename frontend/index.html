<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MARGA MANAGER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              slate: {
                50: '#f8fafc',
                100: '#f1f5f9',
                200: '#e2e8f0',
                300: '#cbd5e1',
                400: '#94a3b8',
                500: '#64748b',
                600: '#475569',
                700: '#334155',
                800: '#1e293b',
                900: '#0f172a',
                950: '#020617',
              },
              primary: {
                DEFAULT: '#18181b', // Slate 900 for buttons
                foreground: '#ffffff',
              },
              accent: {
                50: '#f0fdf4',
                100: '#dcfce7',
                200: '#bbf7d0', // Soft green for highlights
                300: '#86efac',
                400: '#4ade80',
                500: '#22c55e',
              }
            },
            fontFamily: {
              display: ['DM Sans', 'sans-serif'],
              body: ['Inter', 'sans-serif'],
            },
            boxShadow: {
              'soft': '0 2px 10px rgba(0,0,0,0.03)',
              'card': '0 0 0 1px rgba(0,0,0,0.03), 0 2px 8px rgba(0,0,0,0.04)',
            },
            borderRadius: {
              'xl': '0.75rem',
              '2xl': '1rem',
              '3xl': '1.5rem',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --bg-primary: #f1f5f9;
        --bg-surface: #ffffff;
        --bg-surface-2: #f8fafc;
        --text-primary: #0f172a;
        --text-secondary: #64748b;
        --text-muted: #94a3b8;
        --border-color: #e2e8f0;
        --border-light: #f1f5f9;
        --color-primary: #0f172a;
        --color-accent: #10b981;
        --shadow-card: 0 1px 3px 0 rgb(0 0 0 / 0.06), 0 1px 2px -1px rgb(0 0 0 / 0.06);
      }
      [data-theme="dark"] {
        --bg-primary: #0f172a;
        --bg-surface: #1e293b;
        --bg-surface-2: #162032;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #475569;
        --border-color: #334155;
        --border-light: #1e293b;
        --color-primary: #f1f5f9;
        --color-accent: #10b981;
        --shadow-card: 0 1px 3px 0 rgb(0 0 0 / 0.3), 0 1px 2px -1px rgb(0 0 0 / 0.3);
      }
      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Inter', sans-serif;
        transition: background-color 0.2s ease, color 0.2s ease;
      }
      .shadow-card {
        box-shadow: var(--shadow-card);
      }
      .sidebar-scroll::-webkit-scrollbar {
        width: 4px;
      }
      .sidebar-scroll::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 4px;
      }
    </style>
  <script type="importmap">

  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",

    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",

    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom": "https://esm.sh/react-dom@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "axios": "https://esm.sh/axios@^1.7.0"
  }
}
</script>
</head>
